# This workflow will release new versions when required using semantic-release

name: Semantic-Release CI

on:
  push:
    branches: [main, beta]
    tags: ['v*-redfish.*.*']

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic-release.outputs.version }}
    steps:
      - name: Checkout Console
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ">=1.23.0"

      - name: Semantic Release dry-run
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.ROSIE_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            npm install @semantic-release/exec @semantic-release/changelog
            npx semantic-release --dry-run --no-ci
            version=$(cat .VERSION)
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Version
        run: echo "The next version is ${{ steps.semantic-release.outputs.version }}"

      - name: Fail if version is empty
        run: |
          if [ -z "${{ steps.semantic-release.outputs.version }}" ]; then
            echo "Version output is empty. Failing the job."
            exit 1
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Console
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check out Sample Web UI
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: device-management-toolkit/sample-web-ui
          ref: main
          path: ./temp

      - name: Use Node.js 22.x
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 22.x

      - run: npm ci
        working-directory: ./temp

      - run: npm run build-enterprise
        working-directory: ./temp

      - name: move files
        run: mv ./temp/ui/browser/* ./internal/controller/httpapi/ui

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: ">=1.23.0"

      - name: Version
        run: echo "The next version is ${{ needs.prepare.outputs.version }}"

      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # Cross-compile all platform binaries from a single runner using CGO_ENABLED=0
      # Static Go binaries are cross-platform compatible, so we can build all targets from Linux
      - name: Build Linux x64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/linux/console_linux_x64 ./cmd/app

      - name: Build Linux x64 headless
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags=noui -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/linux/console_linux_x64_headless ./cmd/app

      - name: Build Linux arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/linux/console_linux_arm64 ./cmd/app

      - name: Build Linux arm64 headless
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags=noui -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/linux/console_linux_arm64_headless ./cmd/app

      - name: Build Windows x64
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/windows/console_windows_x64.exe ./cmd/app

      - name: Build Windows x64 headless
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -tags=noui -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/windows/console_windows_x64_headless.exe ./cmd/app

      - name: Build macOS arm64
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/darwin/console_mac_arm64 ./cmd/app

      - name: Build macOS arm64 headless
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -tags=noui -ldflags "-s -w -X 'github.com/device-management-toolkit/console/internal/app.Version=${{ needs.prepare.outputs.version }}'" -trimpath -o dist/darwin/console_mac_arm64_headless ./cmd/app

      # Cache all build artifacts in a single step
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            dist/linux
            dist/darwin
            dist/windows
          key: all-platforms-${{ env.sha_short }}

  release:
    permissions:
      contents: write # for Git to git push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Console
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Restore unified build cache
      - shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            dist/linux
            dist/darwin
            dist/windows
          key: all-platforms-${{ env.sha_short }}

      # Generate licenses.zip
      - name: Use Node.js 22.x
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 22.x

      # Pin Go only for license generation
      - name: Use Go 1.25.1 for license scan
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.25.1"
          check-latest: true
      - name: Pin toolchain for this step
        run: |
          go version
          go env -w GOTOOLCHAIN=local

      - name: Checkout Sample Web UI for license scan
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: device-management-toolkit/sample-web-ui
          ref: main
          path: ./temp

      - name: Generate Go Licenses
        run: |
          go install github.com/google/go-licenses/v2@v2.0.1
          mkdir -p licenses
          if ! "$(go env GOPATH)"/bin/go-licenses save ./... --save_path=./licenses/consoledependencies; then
            echo "Failed to generate Go licenses"
            exit 1
          fi

      - name: Generate Web UI Licenses
        working-directory: ./temp
        run: |
          npm ci
          npm install -g license-checker-rseidelsohn@4.4.2
          mkdir -p ../licenses/webuidependencies
          if ! license-checker-rseidelsohn --plainVertical --out ../licenses/webuidependencies/webui_dependencies.txt; then
            echo "Failed to generate Web UI licenses"
            exit 1
          fi

      - name: Create licenses.zip
        run: zip -r licenses.zip licenses

      - name: Docker Login
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: vprodemo.azurecr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true

      - name: Sync git tags
        run: |
          git fetch --tags --force origin

      - name: Semantic Release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@b1b432f13acb7768e0c8efdec416d363a57546f2 # v4.1.1
        if: steps.cache.outputs.cache-hit != 'true' && !startsWith(github.ref, 'refs/tags/') # do not run if cache hit or tag-triggered
        with:
          semantic_version:
            19.0.5 # It is recommended to specify a version range
            # for semantic-release when using
            # semantic-release-action lower than @v3
          extra_plugins: |
            @semantic-release/exec@6.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.ROSIE_TOKEN }}

      - name: Package release assets for redfish tag
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-redfish.')
        run: |
          chmod +x dist/linux/console_linux_x64
          chmod +x dist/linux/console_linux_arm64
          chmod +x dist/darwin/console_mac_arm64

          tar cvfpz console_linux_x64.tar.gz dist/linux/console_linux_x64
          tar cvfpz console_linux_arm64.tar.gz dist/linux/console_linux_arm64
          tar cvfpz console_mac_arm64.tar.gz dist/darwin/console_mac_arm64

      - name: Create GitHub Release from redfish tag
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-redfish.')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            **Note:** Headless variants are only available in GA releases.
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.ROSIE_TOKEN }}

      - name: Upload release assets with labels for redfish tag
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-redfish.')
        env:
          GH_TOKEN: ${{ secrets.ROSIE_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "console_linux_arm64.tar.gz#Linux ARM64 Console (Full)" \
            "console_linux_x64.tar.gz#Linux x64 Console (Full)" \
            "console_mac_arm64.tar.gz#macOS ARM64 Console (Full)" \
            "dist/windows/console_windows_x64.exe#Windows x64 Console (Full)" \
            "licenses.zip#Third-Party Licenses" \
            --clobber

      - name: Check if OpenAPI files changed
        id: check-openapi-changes
        run: |
          git fetch origin main
          if git diff --name-only origin/main HEAD | grep -q '^internal/controller/openapi/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate OpenAPI specification
        if: steps.semantic-release.outputs.new_release_published == 'true' && steps.check-openapi-changes.outputs.changed == 'true'
        run: |
          GIN_MODE=debug go run ./cmd/app

      - name: Verify OpenAPI spec was generated
        if: steps.semantic-release.outputs.new_release_published == 'true' && steps.check-openapi-changes.outputs.changed == 'true'
        run: |
          if [ ! -f "doc/openapi.json" ]; then
            exit 1
          fi
          head -20 doc/openapi.json

      - name: Push to SwaggerHub
        if: steps.semantic-release.outputs.new_release_published == 'true' && steps.check-openapi-changes.outputs.changed == 'true' && vars.SWAGGERHUB_OWNER != '' && vars.SWAGGERHUB_API_NAME != ''
        env:
          SWAGGERHUB_API_KEY: ${{ secrets.SWAGGERHUB_API_KEY }}
          SWAGGERHUB_OWNER: ${{ vars.SWAGGERHUB_OWNER }}
          API_NAME: ${{ vars.SWAGGERHUB_API_NAME }}
          API_VERSION: ${{ steps.semantic-release.outputs.new_release_version }}
        run: |
          echo "Pushing OpenAPI spec to SwaggerHub with version ${{ steps.semantic-release.outputs.new_release_version }}..."
          curl -X POST "https://api.swaggerhub.com/apis/${SWAGGERHUB_OWNER}/${API_NAME}/${API_VERSION}" \
            -H "Authorization: ${SWAGGERHUB_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary @doc/openapi.json \
            --fail